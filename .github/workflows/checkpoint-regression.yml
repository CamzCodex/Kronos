name: Checkpoint regression

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
    paths:
      - "model/**"
      - "requirements.txt"
      - "tests/test_kronos_regression.py"
      - ".github/workflows/checkpoint-regression.yml"

permissions:
  contents: read

concurrency:
  group: checkpoint-regression-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression:
    name: Released checkpoint compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      HF_HOME: ${{ github.workspace }}/.cache/huggingface
      HF_HUB_DISABLE_TELEMETRY: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Restore Hugging Face cache
        uses: actions/cache@v4
        with:
          path: .cache/huggingface
          key: kronos-hf-${{ runner.os }}-${{ hashFiles('tests/test_kronos_regression.py') }}
          restore-keys: |
            kronos-hf-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Run released-checkpoint regression tests
        run: python -m pytest tests/test_kronos_regression.py -q
