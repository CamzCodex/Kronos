name: Package smoke test

on:
  pull_request:
  push:
    branches:
      - master
      - "hardening/**"

permissions:
  contents: read

concurrency:
  group: package-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-install:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install editable development package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Verify editable package metadata
        run: |
          python - <<'PY'
          from importlib.metadata import version
          import finetune
          import model
          from finetune import (
              load_frame_mapping,
              load_named_frame_mapping,
              load_test_data,
              safe_archive_path,
              save_frame_mapping,
              save_named_frame_mapping,
              save_prediction_signals,
          )
          from model import Kronos, KronosPredictor, KronosTokenizer

          assert model.__version__ == "0.1.0.dev0"
          assert version("kronos-timeseries") == model.__version__
          assert Kronos is not None
          assert KronosPredictor is not None
          assert KronosTokenizer is not None
          assert finetune is not None
          assert callable(load_frame_mapping)
          assert callable(load_named_frame_mapping)
          assert callable(load_test_data)
          assert callable(safe_archive_path)
          assert callable(save_frame_mapping)
          assert callable(save_named_frame_mapping)
          assert callable(save_prediction_signals)
          PY

      - name: Build source and wheel distributions
        run: python -m build

      - name: Install built wheel without dependencies
        run: |
          python -m pip uninstall -y kronos-timeseries
          python -m pip install --no-deps dist/*.whl

      - name: Verify wheel import outside the source tree
        run: |
          cd "${RUNNER_TEMP}"
          python - <<'PY'
          import os
          from importlib.metadata import version
          from pathlib import Path

          import finetune
          import model
          from finetune import archive_paths, backtest_io, data_io

          workspace = Path(os.environ["GITHUB_WORKSPACE"]).resolve()
          model_imported_from = Path(model.__file__).resolve()
          finetune_imported_from = Path(finetune.__file__).resolve()

          assert not model_imported_from.is_relative_to(workspace)
          assert not finetune_imported_from.is_relative_to(workspace)
          assert version("kronos-timeseries") == model.__version__
          assert model.get_model_class("kronos") is model.Kronos
          assert data_io.FORMAT_VERSION == 1
          assert archive_paths.SAFE_ARCHIVE_SUFFIX == ".kronos.zip"
          assert callable(backtest_io.load_test_data)
          assert callable(backtest_io.save_prediction_signals)
          PY
